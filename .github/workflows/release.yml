name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Compute + push the next semver tag from commit messages.
      # Default bump is patch; put #minor or #major in a commit subject to bump higher,
      # or #none to skip a release for that merge.
      - name: Bump version tag
        id: tag
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
          RELEASE_BRANCHES: main

      - name: Set up Go
        if: steps.tag.outputs.new_tag != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The tag action already pushed the new tag at HEAD; make sure it is present
      # locally so GoReleaser resolves the version from it.
      - name: Fetch tags
        if: steps.tag.outputs.new_tag != ''
        run: git fetch --tags --force

      - name: Run GoReleaser
        if: steps.tag.outputs.new_tag != ''
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.new_tag }}
